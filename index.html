<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Yoto OS Control Deck</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; background: #fafafa; }
        .box { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { background: #ff6b35; color: white; font-weight: bold; border: none; padding: 12px; width: 100%; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>🦊 Yoto .yexe Operating Environment</h2>
    
    <div class="box">
        <h3>Link Account</h3>
        <button id="authBtn">Connect via Yoto Gateway</button>
    </div>

    <div class="box">
        <h3>Compile & Upload .yexe Package</h3>
        <form id="buildForm">
            <input type="text" id="name" placeholder="Application Title" required>
            <input type="text" id="icon" placeholder="Matrix Icon (e.g. yoto:rocket)" required>
            <textarea id="sPrompt" placeholder="Initial Scene Audio Description" required></textarea>
            <textarea id="oZero" placeholder="Path 0 Execution Conclusion Audio Text" required></textarea>
            <textarea id="oOne" placeholder="Path 1 Execution Conclusion Audio Text" required></textarea>
            <button type="submit">Compile Binary Stream</button>
        </form>
    </div>

    <script>
        document.getElementById('authBtn').addEventListener('click', async () => {
            const verifier = Array.from(crypto.getRandomValues(new Uint8Array(32))).map(b => b.toString(16).padStart(2, '0')).join('');
            sessionStorage.setItem('yoto_pkce_verifier', verifier);
            const digest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
            const challenge = btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
            
            const redirect = `${window.location.origin}/callback.html`;
            window.location.href = `https://yoto.com/oauth/authorize?client_id=${window.location.hostname}&redirect_uri=${encodeURIComponent(redirect)}&response_type=code&scope=user%3Acontent%3Aview%20user%3Acontent%3Amanage%20offline_access&code_challenge=${challenge}&code_challenge_method=S256`;
        });

        document.getElementById('buildForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                appName: document.getElementById('name').value,
                iconIdentifier: document.getElementById('icon').value,
                yexeData: {
                    format: "yexe-v1",
                    entry: "start",
                    executable: {
                        start: {
                            display: document.getElementById('icon').value,
                            audio_prompt: document.getElementById('sPrompt').value,
                            type: "decision", branches: ["zero", "one"]
                        },
                        zero: { display: "yoto:tick", audio_prompt: document.getElementById('oZero').value, type: "end" },
                        one: { display: "yoto:cross", audio_prompt: document.getElementById('oOne').value, type: "end" }
                    }
                }
            };
            const res = await fetch('/api/apps/compile', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if(res.ok) alert("Published successfully!");
        });
    </script>
</body>
</html>
