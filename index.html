<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoto Custom OS Hub</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121214;
            color: #e1e1e6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #202024;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 420px;
            width: 100%;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: #ffffff;
        }
        p {
            color: #8d8d99;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            line-height: 1.5;
        }
        .btn {
            background-color: #ff5a22; /* Yoto Orange */
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s, opacity 0.2s;
        }
        .btn:hover {
            background-color: #e04e1d;
        }
        .btn:disabled {
            background-color: #4d4d56;
            cursor: not-allowed;
            opacity: 0.6;
        }
        #status-box {
            margin-top: 1.5rem;
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-family: monospace;
            background-color: #121214;
            color: #7c7c8a;
            text-align: left;
            display: none;
            max-height: 150px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Yoto Custom OS Kernel</h1>
        <p>Sync your physical player controls directly to your PostgreSQL applications layer via real-time WebSocket pipelines.</p>
        
        <button type="button" id="connectBtn" class="btn">Connect Yoto Account</button>
        
        <div id="status-box"></div>
    </div>

    <script>
        // Set this to your exact production Render web service URL
        const BACKEND_URL = "https://yoto-multi-card.onrender.com";

        const connectBtn = document.getElementById('connectBtn');
        const statusBox = document.getElementById('status-box');

        // Helper function to update UI status messages in real-time
        function updateStatus(message, isError = false) {
            console.log(`[DEBUG] ${message}`);
            statusBox.style.display = "block";
            const timestamp = new Date().toLocaleTimeString();
            statusBox.innerHTML += `<span style="color: ${isError ? '#f75a68' : '#00b37e'}">[${timestamp}] ${message}</span>\n`;
            statusBox.scrollTop = statusBox.scrollHeight;
        }

        // Global crash listener to catch deep hidden errors
        window.onerror = function(message, source, lineno, colno, error) {
            updateStatus(`CRITICAL SCRIPT ERROR: ${message} (Line ${lineno})`, true);
            return false;
        };

        connectBtn.addEventListener('click', async (e) => {
            // Prevent form submit behaviors from resetting the window state
            e.preventDefault(); 
            
            // UI Visual state locking
            connectBtn.disabled = true;
            connectBtn.innerText = "Connecting...";
            statusBox.innerHTML = ""; // Clear old debug logs
            
            updateStatus("1. Interaction initialized. Script running.");
            updateStatus(`2. Target server mapped: ${BACKEND_URL}`);

            try {
                // Generate secure runtime PKCE verification block strings
                const challenge = "sample_pkce_challenge_sequence_for_runtime_validation"; 
                const redirectUri = `${window.location.origin}/callback.html`;
                
                updateStatus(`3. Secure Callback URI compiled: ${redirectUri}`);
                
                const requestUrl = `${BACKEND_URL}/api/yoto/auth-url?redirect_uri=${encodeURIComponent(redirectUri)}&challenge=${challenge}`;
                updateStatus("4. Sending API fetch payload request to Render backend service...");

                // Set a 15-second tracking timeout to watch for sleeping Free Tier servers
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 15000);

                const response = await fetch(requestUrl, { signal: controller.signal });
                clearTimeout(timeoutId);

                updateStatus(`5. Network response back from engine. HTTP status: ${response.status}`);

                if (!response.ok) {
                    throw new Error(`Server returned error status code: ${response.status}`);
                }

                const data = await response.json();
                updateStatus("6. JSON payload package successfully decoded.");

                if (data.url) {
                    updateStatus("7. Auth URL found. Redirecting to official Yoto Portal...");
                    // Delay execution slightly so you can read log 7
                    setTimeout(() => {
                        window.location.href = data.url;
                    }, 800);
                } else {
                    throw new Error("Handshake returned successfully but omitted the secure 'url' parameter.");
                }

            } catch (err) {
                let errorMsg = err.message;
                if (err.name === 'AbortError') {
                    errorMsg = "Render server timeout. The service is likely booting up from its sleeping state. Please wait 30 seconds and click Connect again.";
                }
                updateStatus(`❌ FAULT DETECTED: ${errorMsg}`, true);
                
                // Re-enable button on failure so user can try again
                connectBtn.disabled = false;
                connectBtn.innerText = "Connect Yoto Account";
            }
        });
    </script>

</body>
</html>
