<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kernel Connecting...</title>
    <style>
        body { font-family: system-ui, sans-serif; text-align: center; padding: 60px 20px; background: #f7fafc; color: #4a5568; }
        .loader { border: 4px solid #e2e8f0; border-top: 4px solid #ff6b35; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="display">
        <h2>🔒 Finalizing Secure Environment Handshake</h2>
        <p>Registering hardware system endpoints into runtime routing maps...</p>
        <div class="loader"></div>
    </div>

    <script>
        async function completeHandshake() {
            const urlParams = new URLSearchParams(window.location.search);
            const authCode = urlParams.get('code');
            const codeVerifier = sessionStorage.getItem('yoto_verifier');
            const redirectUri = window.location.origin + window.location.pathname;

            if (!authCode) {
                document.getElementById('display').innerHTML = "<h2>❌ Handshake Terminated</h2><p>Missing system authority credentials.</p>";
                return;
            }

            try {
                const response = await fetch(`${window.location.origin}/api/yoto/callback`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ authCode, codeVerifier, redirectUri })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    window.location.href = 'index.html?connected=true';
                } else {
                    document.getElementById('display').innerHTML = `<h2>❌ Link Aborted</h2><p>${data.error || 'The authentication handshake failed.'}</p>`;
                }
            } catch {
                document.getElementById('display').innerHTML = "<h2>❌ System Unreachable</h2><p>Could not connect to the cloud kernel execution framework.</p>";
            }
        }

        completeHandshake();
    </script>
</body>
</html>
